id: mnist_sanity
iteration: 0
description: reproduce paper baseline - no Byzantine, small-world, FedAvg
use_saved_topology: false
topology_file: ../data/topologies/sanity/small_world_128.json
nodes: 128
num_workers: 16
rounds: 30
synchronous: true
device: cuda:2
topology: small-world
small_world_k: 4
small_world_beta: 0.1
scale_free_m: 10
edge_density: 1.0
malicious_proportion: 0.0
attack_type: noise
attack_args:
  strength: 10
aggregation: fedavg
trimmed_mean_beta: 0.2
dataset: mnist
dataset_kwargs:
  data_dir: ../data/datasets
  download: true
model_ckpt_dir: ../data/ckpts
model_name: mnist
results_dir: ../data/results
num_samples: 250
epochs_per_round: 2
batch_size: 32